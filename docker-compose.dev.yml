# LOCAL DEVELOPMENT ONLY — provides Postgres for `mix test` and dev iex.
# Production runs `mix release` under systemd on the VM; see deploy/README.md.
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d db
version: "3"

services:
  db:
    image: postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      PGDATA: /var/lib/postgresql/data/pgdata
    restart: always
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
